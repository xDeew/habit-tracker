<div class="auth-card auth-card-single">
  <div class="auth-toggle">
    <button
      type="button"
      class="toggle-button"
      hx-get="/partials/auth/login"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Login
    </button>

    <button
      type="button"
      class="toggle-button toggle-button-active"
      hx-get="/partials/auth/signup"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Sign up
    </button>
  </div>

  <p class="form-kicker">Create account</p>
  <h3>Start your tracker</h3>
  <p class="auth-card-text">
    Create an account to begin tracking habits, entries, and long-term progress.
  </p>

  <form class="form-stack">
    <label>
      <span>Username</span>
      <input type="text" name="username" placeholder="Enter username" />
    </label>

    <label>
      <span>Email</span>
      <input type="email" name="email" placeholder="Enter email" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" name="password" placeholder="Enter password" />
    </label>

    <button
      type="button"
      class="primary-action"
      onclick="setAuthMode('signup')"
    >
      Create account
    </button>
  </form>

  <p class="auth-helper-text">
    Already have an account?
    <button
      type="button"
      class="text-button"
      hx-get="/partials/auth/login"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Login
    </button>
  </p>
</div>
