<div class="auth-card auth-card-single">
  <div class="auth-toggle">
    <button
      type="button"
      class="toggle-button toggle-button-active"
      hx-get="/partials/auth/login"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Login
    </button>

    <button
      type="button"
      class="toggle-button"
      hx-get="/partials/auth/signup"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Sign up
    </button>
  </div>

  <p class="form-kicker">Account access</p>
  <h3>Continue to your tracker</h3>
  <p class="auth-card-text">
    Enter your details to access your habits, entries, and progress.
  </p>

  <form class="form-stack">
    <label>
      <span>Email</span>
      <input type="email" name="email" placeholder="Enter email" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" name="password" placeholder="Enter password" />
    </label>

    <button type="button" class="primary-action">Login</button>
  </form>

  <p class="auth-helper-text">
    Don’t have an account?
    <button
      type="button"
      class="text-button"
      hx-get="/partials/auth/signup"
      hx-target="#auth-container"
      hx-swap="innerHTML swap:120ms settle:180ms"
    >
      Sign up
    </button>
  </p>
</div>
